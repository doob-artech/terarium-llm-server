services:
  ollama-gpu-0:
    image: ollama/ollama:latest
    container_name: ollama-gpu-0
    restart: unless-stopped
    ports:
      - "11434:11434"
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
      OLLAMA_MODELS: /models
      NVIDIA_VISIBLE_DEVICES: "0"
    volumes:
      - ollama_models:/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0"]
              capabilities: ["gpu"]

